<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EXFIL // ZERO</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EXFIL">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#040a0f">
<style>
/* NO external font imports — use system monospace stack only */
:root{
  --neon:#00ffe7;--red:#ff2a2a;--gold:#ffd700;
  --dark:#040a0f;--panel:rgba(0,20,30,0.95);--border:rgba(0,255,231,0.3);
  --font:'Courier New',Courier,monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#040a0f;touch-action:none;user-select:none;-webkit-user-select:none;}
body{font-family:var(--font);color:var(--neon);padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);}
#gameCanvas{position:fixed;top:0;left:0;display:block;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;padding-top:max(16px,env(safe-area-inset-top));
  background:radial-gradient(ellipse at center,#001a24 0%,#040a0f 70%);z-index:100;overflow-y:auto;}

.logo{font-weight:900;font-size:clamp(1.5rem,6vw,3rem);letter-spacing:0.25em;color:var(--neon);
  text-shadow:0 0 20px var(--neon),0 0 50px rgba(0,255,231,0.4);
  animation:pulse 2s ease-in-out infinite;text-align:center;margin-bottom:0.2rem;}
.tagline{font-size:0.7rem;letter-spacing:0.4em;color:rgba(0,255,231,0.5);margin-bottom:1.4rem;text-align:center;}
@keyframes pulse{0%,100%{text-shadow:0 0 20px var(--neon),0 0 50px rgba(0,255,231,0.4);}
  50%{text-shadow:0 0 35px var(--neon),0 0 80px rgba(0,255,231,0.5),0 0 2px #fff;}}

.btn{background:transparent;border:1px solid var(--neon);color:var(--neon);
  font-family:var(--font);font-size:0.82rem;letter-spacing:0.15em;
  padding:0.65rem 1.5rem;cursor:pointer;margin:0.22rem;
  text-transform:uppercase;min-width:185px;}
.btn:active{background:var(--neon);color:var(--dark);}
.btn.danger{border-color:var(--red);color:var(--red);}
.btn.danger:active{background:var(--red);color:#fff;}
.btn.gold{border-color:var(--gold);color:var(--gold);}
.btn.gold:active{background:var(--gold);color:var(--dark);}
.btn.sm{min-width:0;font-size:0.72rem;padding:0.45rem 0.9rem;}

input[type=text]{background:rgba(0,255,231,0.05);border:1px solid var(--border);color:var(--neon);
  font-family:var(--font);font-size:0.82rem;padding:0.5rem 0.8rem;
  width:210px;letter-spacing:0.1em;margin:0.22rem;outline:none;text-align:center;}
input:focus{border-color:var(--neon);}
input::placeholder{color:rgba(0,255,231,0.3);}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:7px 9px;display:none;
  align-items:flex-start;justify-content:space-between;pointer-events:none;z-index:10;}
.hp{background:var(--panel);border:1px solid var(--border);padding:5px 8px;min-width:96px;}
.hl{font-size:0.48rem;letter-spacing:0.3em;color:rgba(0,255,231,0.5);margin-bottom:1px;}
.hv{font-size:0.82rem;font-weight:700;}
#hBar{width:100%;height:3px;background:rgba(255,42,42,0.2);margin-top:2px;}
#hFill{height:100%;background:var(--red);transition:width 0.2s;box-shadow:0 0 5px var(--red);}
#armorBar{width:100%;height:2px;background:rgba(0,150,255,0.12);margin-top:1px;}
#armorFill{height:100%;background:#4af;transition:width 0.2s;}

/* WEAPON BAR — fixed above joysticks, fully interactive */
#wBar{
  position:fixed;
  bottom:calc(145px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  display:none;flex-direction:row;gap:5px;
  z-index:60; /* above everything */
  pointer-events:auto;
  touch-action:auto; /* allow tap on this element */
}
.ws{
  width:52px;height:52px;
  border:1px solid var(--border);background:var(--panel);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:0.52rem;color:rgba(0,255,231,0.5);position:relative;
  cursor:pointer;touch-action:auto;
  -webkit-tap-highlight-color:rgba(0,255,231,0.2);
}
.ws.active{border-color:var(--neon);box-shadow:0 0 10px rgba(0,255,231,0.4);color:var(--neon);}
.ws:active{background:rgba(0,255,231,0.15);}
.wi{font-size:1rem;margin-bottom:1px;}
.wk{position:absolute;top:2px;left:3px;font-size:0.42rem;color:var(--gold);}

/* SWAP BUTTON */
#swapBtn{
  position:fixed;
  bottom:calc(22px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  width:62px;height:62px;border-radius:50%;
  background:rgba(255,215,0,0.12);border:2px solid var(--gold);color:var(--gold);
  font-size:0.52rem;letter-spacing:0.03em;
  z-index:60; /* same level as wBar, above joystick z-index */
  display:none;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  touch-action:auto;
  pointer-events:auto;
  -webkit-tap-highlight-color:rgba(255,215,0,0.3);
}
#swapBtn:active{background:rgba(255,215,0,0.4);}

/* JOYSTICKS z-index: 50, below swap (60) */
#joyL,#joyR{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));
  width:110px;height:110px;border-radius:50%;
  background:rgba(0,255,231,0.05);border:2px solid rgba(0,255,231,0.2);
  z-index:50;touch-action:none;display:none;pointer-events:auto;
}
#joyL{left:20px;}#joyR{right:20px;}
.jt{position:absolute;width:42px;height:42px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,255,231,0.65),rgba(0,255,231,0.15));
  border:2px solid var(--neon);top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 9px rgba(0,255,231,0.35);pointer-events:none;}

/* MISC */
#lootPop{position:fixed;bottom:calc(215px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--gold);color:var(--gold);
  padding:5px 13px;font-size:0.72rem;z-index:22;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#minimap{position:fixed;top:8px;right:8px;width:108px;height:108px;border:1px solid var(--border);background:rgba(0,10,15,0.85);z-index:10;display:none;}
#exTimer{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:1.4rem;color:var(--gold);text-shadow:0 0 18px var(--gold);z-index:30;display:none;text-align:center;}
#killfeed{position:fixed;right:124px;top:8px;z-index:20;pointer-events:none;}
.kf{background:rgba(255,42,42,0.13);border-left:2px solid var(--red);padding:2px 7px;font-size:0.65rem;margin-bottom:2px;animation:fi 0.2s;}
@keyframes fi{from{opacity:0;transform:translateX(14px)}to{opacity:1}}
#connSt{position:fixed;bottom:calc(145px + env(safe-area-inset-bottom,0px));right:9px;font-size:0.58rem;color:rgba(0,255,231,0.4);z-index:20;display:none;}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#888;margin-right:3px;}
.dot.g{background:#0f8;}.dot.y{background:var(--gold);}.dot.r{background:var(--red);}

/* LOBBY */
.lcode{font-size:1.4rem;color:var(--gold);letter-spacing:0.4em;padding:0.6rem 1.3rem;border:1px solid var(--gold);margin:0.5rem 0;text-shadow:0 0 10px var(--gold);}
.li{font-size:0.7rem;color:rgba(0,255,231,0.6);margin:0.22rem 0;letter-spacing:0.12em;}
.pe{padding:3px 13px;border-left:2px solid var(--neon);margin:3px 0;font-size:0.8rem;}

/* GAME OVER */
.got{font-size:clamp(1.5rem,5vw,2.6rem);font-weight:900;margin-bottom:0.5rem;text-align:center;}
.got.dead{color:var(--red);text-shadow:0 0 25px var(--red);}
.got.win{color:var(--gold);text-shadow:0 0 25px var(--gold);}

/* SHOP */
#shopScreen{display:none;}
.shop-cur{font-size:0.82rem;color:var(--gold);margin-bottom:0.7rem;text-align:center;letter-spacing:0.1em;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:400px;margin-bottom:10px;}
.si{background:var(--panel);border:1px solid var(--border);padding:9px 7px;text-align:center;position:relative;cursor:pointer;}
.si.maxed{opacity:0.55;cursor:default;}
.si:active:not(.maxed){background:rgba(0,255,231,0.1);}
.si .sii{font-size:1.5rem;margin-bottom:2px;}
.si .sin{font-size:0.62rem;letter-spacing:0.08em;color:var(--neon);margin-bottom:2px;}
.si .sid{font-size:0.52rem;color:rgba(0,255,231,0.42);margin-bottom:3px;line-height:1.3;}
.si .sic{font-size:0.67rem;color:var(--gold);}
.si .sil{position:absolute;top:3px;right:4px;font-size:0.5rem;color:rgba(255,215,0,0.55);}

.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:999;}
</style>
</head>
<body>
<div class="scanline"></div>
<canvas id="gameCanvas"></canvas>

<!-- MAIN MENU -->
<div id="mainMenu" class="screen">
  <div class="logo">EXFIL // ZERO</div>
  <div class="tagline">Extract or Die Trying</div>
  <input type="text" id="nameInput" placeholder="CALL SIGN" maxlength="12">
  <button class="btn gold" onclick="startSolo()">SOLO RUN</button>
  <button class="btn" onclick="openShop()">UPGRADE SHOP</button>
  <button class="btn" onclick="createLobby()">HOST GAME</button>
  <button class="btn" onclick="toggleJoin()">JOIN GAME</button>
  <div id="joinSection" style="display:none;flex-direction:column;align-items:center;">
    <input type="text" id="codeInput" placeholder="ROOM CODE" maxlength="6" style="text-transform:uppercase;margin-top:3px;">
    <button class="btn" onclick="joinLobby()">CONNECT</button>
  </div>
  <div id="menuStats" style="margin-top:0.9rem;font-size:0.65rem;color:rgba(0,255,231,0.38);text-align:center;letter-spacing:0.08em;"></div>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen">
  <div class="logo" style="font-size:1.3rem;margin-bottom:0.3rem;">UPGRADE SHOP</div>
  <div class="shop-cur">STASH: <span id="shopGold">0</span> 💰 &nbsp;|&nbsp; SPENT: <span id="shopSpent">0</span></div>
  <div class="sgrid" id="shopGrid"></div>
  <button class="btn danger sm" onclick="closeShop()">BACK</button>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen" style="display:none">
  <div class="logo" style="font-size:1.4rem">STAGING</div>
  <div class="li">SHARE CODE</div>
  <div class="lcode" id="lobbyCode">------</div>
  <div class="li" id="lobbyStatus">WAITING...</div>
  <div id="playerList"></div>
  <button class="btn gold" id="startBtn" style="display:none;margin-top:6px;" onclick="hostStart()">DEPLOY</button>
  <button class="btn danger" onclick="leaveLobby()">ABORT</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hp">
    <div class="hl">HEALTH</div>
    <div class="hv" id="hpVal" style="color:var(--red)">100</div>
    <div id="hBar"><div id="hFill" style="width:100%"></div></div>
    <div id="armorBar"><div id="armorFill" style="width:0%"></div></div>
  </div>
  <div class="hp" style="text-align:center">
    <div class="hl">LOOT</div>
    <div class="hv" style="color:var(--gold)" id="lootVal">0</div>
    <div class="hl" style="margin-top:2px">ZONE</div>
    <div class="hv" id="zoneT" style="font-size:0.76rem">--:--</div>
  </div>
  <div class="hp" style="text-align:right">
    <div class="hl">AMMO</div>
    <div class="hv" id="ammoD" style="color:var(--gold)">-/-</div>
    <div class="hl" style="margin-top:2px">KILLS</div>
    <div class="hv" id="killC">0</div>
  </div>
</div>

<div id="wBar"></div>
<canvas id="minimap" width="108" height="108"></canvas>
<div id="killfeed"></div>
<div id="connSt"><span class="dot" id="connDot"></span><span id="connTxt">OFFLINE</span></div>
<div id="lootPop"></div>
<div id="exTimer"></div>
<div id="joyL"><div class="jt" id="tL"></div></div>
<div id="joyR"><div class="jt" id="tR"></div></div>
<!-- SWAP: simple button, no conflicting touch handler -->
<div id="swapBtn"><span style="font-size:1.1rem">🔄</span><span>SWAP</span></div>

<!-- GAME OVER -->
<div id="goScreen" class="screen" style="display:none">
  <div class="got" id="goTitle">ELIMINATED</div>
  <div style="font-size:0.78rem;letter-spacing:0.1em;margin:0.5rem 0;color:rgba(0,255,231,0.7);text-align:center" id="goStats"></div>
  <div style="font-size:0.67rem;color:rgba(255,215,0,0.6);margin-bottom:0.9rem;text-align:center" id="goStash"></div>
  <button class="btn gold" onclick="goToShop()">VISIT SHOP</button>
  <button class="btn" onclick="goToMenu()">MAIN MENU</button>
</div>

<script>
'use strict';
// ════════════════════════════════════════════════════
// EXFIL // ZERO  v5  —  no external deps
// ════════════════════════════════════════════════════
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const mmCv=document.getElementById('minimap');
const mmCtx=mmCv.getContext('2d');

const TILE=40,MAP_W=64,MAP_H=64;
const BASE_SPEED=180,BASE_HEALTH=100;
const EXTRACTION_MS=5000,ZONE_SECS=120;

// ── Weapon templates ───────────────────────────────
const WDEFS={
  pistol: {name:'PISTOL',icon:'[P]',ammo:12,res:48, fr:250,rt:1200,dmg:18,spd:480,spread:0.04,burst:1,col:'#fff',  rng:1.4},
  smg:    {name:'SMG',   icon:'[S]',ammo:30,res:120,fr:90, rt:1600,dmg:12,spd:520,spread:0.10,burst:1,col:'#fd4',  rng:1.2},
  shotgun:{name:'SHTGN', icon:'[G]',ammo:6, res:24, fr:700,rt:2000,dmg:14,spd:380,spread:0.30,burst:6,col:'#f84',  rng:0.7},
  rifle:  {name:'RIFLE', icon:'[R]',ammo:20,res:60, fr:180,rt:2200,dmg:28,spd:680,spread:0.02,burst:1,col:'#4fb',  rng:2.0},
  sniper: {name:'SNPR',  icon:'[N]',ammo:5, res:15, fr:900,rt:2500,dmg:80,spd:900,spread:0.005,burst:1,col:'#a4f',rng:3.0},
};
// Emoji alternatives rendered in canvas (not HTML buttons) — fine
const WEP_EMOJI={pistol:'🔫',smg:'⚡',shotgun:'💥',rifle:'🎯',sniper:'🔭'};

function mkWep(key){
  const d=WDEFS[key];
  return{key,name:d.name,ammo:d.ammo,reserve:d.res,fireRate:d.fr,reloadTime:d.rt,
    damage:d.dmg,bulletSpd:d.spd,spread:d.spread,burst:d.burst,color:d.col,range:d.rng,
    reloading:false,reloadStart:0};
}

// ── Upgrade definitions ────────────────────────────
const UPGRADES=[
  {id:'maxhp',   icon:'HP+', name:'MAX HEALTH',  desc:'+20 HP / level',      maxLvl:5,costs:[150,250,400,600,900]},
  {id:'speed',   icon:'SPD', name:'MOVE SPEED',  desc:'+8% speed / level',   maxLvl:4,costs:[200,350,550,800]},
  {id:'armor',   icon:'ARM', name:'ARMOR',        desc:'+20 armor / level',   maxLvl:3,costs:[300,500,750]},
  {id:'reloads', icon:'RLD', name:'FAST RELOAD',  desc:'-15% reload / level', maxLvl:3,costs:[180,300,480]},
  {id:'damage',  icon:'DMG', name:'DAMAGE BOOST', desc:'+10% dmg / level',    maxLvl:4,costs:[250,400,600,900]},
  {id:'radar',   icon:'RDR', name:'RADAR',         desc:'Enemies on minimap', maxLvl:1,costs:[350]},
  {id:'startgear',icon:'GR',name:'STARTER GEAR',  desc:'Start with SMG',     maxLvl:1,costs:[500]},
  {id:'insure',  icon:'INS', name:'INSURANCE',     desc:'Keep 30% on death',  maxLvl:1,costs:[800]},
];

// ── IndexedDB ──────────────────────────────────────
let db;
async function initDB(){
  return new Promise(res=>{
    const r=indexedDB.open('ExfilV5',1);
    r.onupgradeneeded=e=>{
      if(!e.target.result.objectStoreNames.contains('profile'))
        e.target.result.createObjectStore('profile',{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;res();};
    r.onerror=()=>res();
  });
}
function dbSave(v){if(!db)return;try{db.transaction('profile','readwrite').objectStore('profile').put(v);}catch(_){}}
function dbLoad(k){return new Promise(res=>{if(!db)return res(null);try{const r=db.transaction('profile','readonly').objectStore('profile').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);}catch(_){res(null);}});}

// ── Profile ────────────────────────────────────────
let prof={id:'main',stash:0,totalSpent:0,upgrades:{},totalRuns:0,totalKills:0,totalExtractions:0};
async function loadProf(){const p=await dbLoad('main');if(p)prof=p;updMenuStats();}
function saveProf(){dbSave({...prof});}
function upgLvl(id){return prof.upgrades[id]||0;}
function calcMaxHP(){return BASE_HEALTH+upgLvl('maxhp')*20;}
function calcSpeed(){return BASE_SPEED*(1+upgLvl('speed')*0.08);}
function calcArmor(){return upgLvl('armor')*20;}
function calcDmgMult(){return 1+upgLvl('damage')*0.10;}
function calcRldMult(){return 1-upgLvl('reloads')*0.15;}
function hasRadar(){return upgLvl('radar')>0;}
function hasInsurance(){return upgLvl('insure')>0;}
function hasStarterGear(){return upgLvl('startgear')>0;}

// ── Game state ─────────────────────────────────────
let gameState='menu';
let localPlayer=null,players={},enemies=[],bullets=[],lootItems=[],particles=[];
let tileMap=[],extractionZone={x:0,y:0,r:90};
let gameTime=ZONE_SECS,gameTimer=null;
let myId='p_'+Math.random().toString(36).slice(2,8);
let myName='GHOST',kills=0,sessionLoot=0;
let extractionProgress=0,isExtracting=false;
let animId=null,lastT=0,shootCD=0;

// ── P2P: native WebRTC + WebSocket signaling ─────
// No external libs. Uses a public WS relay just for SDP/ICE exchange.
// Game data flows directly P2P over RTCDataChannel.
let isHost=false,roomCode='';
let rtcPeers={},dcs={},sigWs=null;

// We try multiple public signaling servers in order
const SIG_SERVERS=[
  'wss://signal.exfil.workers.dev/', // custom CF worker (if deployed)
  'wss://ws.vi-server.org/mirror/',
  'wss://echo.websocket.events/',
];
let sigIdx=0;

function openSig(onopen){
  function tryNext(){
    if(sigIdx>=SIG_SERVERS.length){setConn('r','NO SIG');return;}
    const url=SIG_SERVERS[sigIdx++];
    sigWs=new WebSocket(url);
    sigWs.onopen=()=>{setConn('y','SIG OK');onopen&&onopen();};
    sigWs.onmessage=e=>{try{onSigMsg(JSON.parse(e.data));}catch(_){}};
    sigWs.onerror=()=>{sigWs=null;tryNext();};
    sigWs.onclose=()=>{if(gameState==='playing')setConn('r','SIG LOST');};
  }
  tryNext();
}

function sigSend(obj){
  if(sigWs&&sigWs.readyState===1)
    sigWs.send(JSON.stringify({...obj,room:roomCode,from:myId}));
}

async function onSigMsg(m){
  if(!m||m.room!==roomCode||m.from===myId)return;
  const pid=m.from;
  if(m.type==='join'){
    // Host: someone joined → create offer
    if(isHost&&!rtcPeers[pid]){
      updLobby(pid,m.name||pid);
      await createOffer(pid);
    }
  }
  if(m.type==='offer'&&!isHost){
    if(!rtcPeers[pid])mkPC(pid);
    const pc=rtcPeers[pid];
    await pc.setRemoteDescription(new RTCSessionDescription(m.sdp));
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    sigSend({type:'answer',to:pid,sdp:ans});
  }
  if(m.type==='answer'&&rtcPeers[pid]){
    await rtcPeers[pid].setRemoteDescription(new RTCSessionDescription(m.sdp));
  }
  if(m.type==='ice'&&rtcPeers[pid]&&m.to===myId){
    try{await rtcPeers[pid].addIceCandidate(new RTCIceCandidate(m.candidate));}catch(_){}
  }
  if(m.type==='start'&&!isHost){
    startGame(m.seed);
  }
}

const ICE={iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'},
]};

function mkPC(pid){
  if(rtcPeers[pid])return rtcPeers[pid];
  const pc=new RTCPeerConnection(ICE);
  rtcPeers[pid]=pc;
  pc.onicecandidate=e=>{
    if(e.candidate)sigSend({type:'ice',to:pid,candidate:e.candidate});
  };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='connected')setConn('g','P2P OK');
    if(pc.connectionState==='disconnected'||pc.connectionState==='failed')onDrop(pid);
  };
  pc.ondatachannel=e=>setupDC(e.channel,pid);
  return pc;
}

async function createOffer(pid){
  const pc=mkPC(pid);
  const dc=pc.createDataChannel('g',{ordered:false,maxRetransmits:0});

function setupDC(dc,pid){

  };

}

function sndP(pid,m){
  const dc=dcs[pid];

function onPMsg(pid,m){

  if(m.type==='state'){if(!players[m.id])players[m.id]=mkRemote(m.id,m.name||'?');const p=players[m.id];p.x=m.x;p.y=m.y;p.aimAngle=m.a;p.health=m.h;p.dead=m.dead;}
  if(m.type==='shoot')spawnBullet(m.x,m.y,m.a,m.id,m.spd,m.col,m.dmg,m.rng);
  if(m.type==='hit'&&m.target===myId&&localPlayer){takeDmg(m.dmg);if(localPlayer.health<=0)playerDead(m.killer);}
  if(m.type==='loot_taken')lootItems=lootItems.filter(l=>l.id!==m.lootId);

  if(m.type==='start'&&!isHost)startGame(m.seed);

// ── RNG ────────────────────────────────────────────
let rng=0;
function rnd(){rng=(rng*1664525+1013904223)&0xffffffff;return(rng>>>0)/0xffffffff;}

// ── Map ────────────────────────────────────────────
function genMap(seed){
  rng=seed;tileMap=[];
  for(let y=0;y<MAP_H;y++){tileMap[y]=[];for(let x=0;x<MAP_W;x++){
    if(x===0||y===0||x===MAP_W-1||y===MAP_H-1){tileMap[y][x]=1;}
    else{const r=rnd();tileMap[y][x]=r<0.12?1:r<0.18?2:0;}
  }}
  for(let i=0;i<14;i++){
    const rx=Math.floor(rnd()*(MAP_W-14))+4,ry=Math.floor(rnd()*(MAP_H-14))+4;
    const rw=Math.floor(rnd()*8)+5,rh=Math.floor(rnd()*8)+5;
    for(let dy=ry;dy<ry+rh;dy++)for(let dx=rx;dx<rx+rw;dx++)if(dy>0&&dy<MAP_H-1&&dx>0&&dx<MAP_W-1)tileMap[dy][dx]=0;
    for(let dy=ry-1;dy<=ry+rh;dy++)for(let dx=rx-1;dx<=rx+rw;dx++){
      if(dy<1||dy>=MAP_H-1||dx<1||dx>=MAP_W-1)continue;
      if((dy===ry-1||dy===ry+rh||dx===rx-1||dx===rx+rw)&&tileMap[dy][dx]===0)tileMap[dy][dx]=1;
    }
  }
}
function solid(x,y){const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;const t=tileMap[ty][tx];return t===1||t===3;}
function isCover(x,y){const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;return tileMap[ty][tx]===2;}

function placeSpawnAndExtraction(){
  const free=[];
  for(let ty=1;ty<MAP_H-1;ty++)for(let tx=1;tx<MAP_W-1;tx++)if(tileMap[ty][tx]===0)free.push([tx,ty]);
  const si=Math.floor(rnd()*free.length);const[stx,sty]=free[si];
  const sx=(stx+0.5)*TILE,sy=(sty+0.5)*TILE;
  let best=free[0],bestD=0;
  for(const[tx,ty] of free){const d=Math.hypot(tx-stx,ty-sty);if(d>bestD){bestD=d;best=[tx,ty];}}
  const[etx,ety]=best;
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){const ty2=ety+dy,tx2=etx+dx;if(ty2>0&&ty2<MAP_H-1&&tx2>0&&tx2<MAP_W-1)tileMap[ty2][tx2]=4;}
  extractionZone={x:(etx+0.5)*TILE,y:(ety+0.5)*TILE,r:90};
  return{sx,sy};
}

function hasLOS(x0,y0,x1,y1){
  let tx0=Math.floor(x0/TILE),ty0=Math.floor(y0/TILE);
  const tx1=Math.floor(x1/TILE),ty1=Math.floor(y1/TILE);
  const dx=Math.abs(tx1-tx0),dy=Math.abs(ty1-ty0);
  const sx=tx0<tx1?1:-1,sy=ty0<ty1?1:-1;
  let err=dx-dy;
  for(let s=0;s<100;s++){
    if(tx0===tx1&&ty0===ty1)return true;
    if(tx0<0||ty0<0||tx0>=MAP_W||ty0>=MAP_H)return false;
    if(tileMap[ty0][tx0]===1||tileMap[ty0][tx0]===3)return false;
    const e2=2*err;if(e2>-dy){err-=dy;tx0+=sx;}if(e2<dx){err+=dx;ty0+=sy;}
  }
  return false;
}

const ADDON_DEFS={
  laser:  {label:'LASER SIGHT', icon:'[L]',color:'#f44'},
  armor:  {label:'ARMOR PLATE', icon:'[A]',color:'#4af'},
  grenade:{label:'GRENADE',     icon:'[G]',color:'#fa0'},

  medkit: {label:'MEDKIT',      icon:'[+]',color:'#0f8'},

  xray:   {label:'THERMAL',     icon:'[T]',color:'#f0f'},
};
// Emoji for canvas draw (fine in canvas, not in HTML buttons)
const ADDON_EMOJI={laser:'🔴',armor:'🛡',grenade:'💣',mine:'⚠',medkit:'➕',stim:'⚡',xray:'👁'};

let grenades=[],mines=[];

function spawnAddons(sx,sy){
  const keys=Object.keys(ADDON_DEFS);
  for(let i=0;i<22;i++){
    let x,y,tr=0;
    do{x=(Math.floor(rnd()*(MAP_W-4))+2)*TILE+TILE/2;y=(Math.floor(rnd()*(MAP_H-4))+2)*TILE+TILE/2;tr++;}while(solid(x,y)&&tr<20);

function applyAddon(key){
  if(!localPlayer)return;
  if(!localPlayer.addons)localPlayer.addons={};
  if(!localPlayer.timers)localPlayer.timers={};
  switch(key){
    case 'laser': localPlayer.addons.laser=true; showPopup('LASER — tight spread'); break;
    case 'armor':
      const gained=30; localPlayer.armor=Math.min((localPlayer.armor||0)+gained,(localPlayer.maxArmor||20)+gained);
      localPlayer.maxArmor=Math.max(localPlayer.maxArmor||0,localPlayer.armor);
      showPopup('+30 ARMOR PLATE'); break;
    case 'grenade': localPlayer.addons.grenades=(localPlayer.addons.grenades||0)+2; showPopup('GRENADES x'+(localPlayer.addons.grenades)+' — [G] throw'); break;
    case 'mine':    localPlayer.addons.mines=(localPlayer.addons.mines||0)+2;    showPopup('MINES x'+(localPlayer.addons.mines)+' — [M] place'); break;
    case 'medkit':  localPlayer.health=Math.min(localPlayer.health+60,localPlayer.maxHealth); showPopup('+60 HP MEDKIT'); break;
    case 'stim':    localPlayer.timers.stim=(localPlayer.timers.stim||0)+10;  showPopup('STIM — +50% speed 10s'); break;
    case 'xray':    localPlayer.timers.xray=(localPlayer.timers.xray||0)+15;  showPopup('THERMAL — see enemies 15s'); break;
  }
}

function throwGrenade(){
  if(!localPlayer||!(localPlayer.addons&&localPlayer.addons.grenades>0))return;
  localPlayer.addons.grenades--;
  grenades.push({x:localPlayer.x,y:localPlayer.y,vx:Math.cos(localPlayer.aimAngle)*220,vy:Math.sin(localPlayer.aimAngle)*220,timer:1.8,owner:'local'});
  showPopup('GRENADE ('+(localPlayer.addons.grenades)+' LEFT)');
}
function placeMine(){
  if(!localPlayer||!(localPlayer.addons&&localPlayer.addons.mines>0))return;
  localPlayer.addons.mines--;
  mines.push({x:localPlayer.x,y:localPlayer.y,armTimer:1.5});
  showPopup('MINE PLACED ('+(localPlayer.addons.mines)+' LEFT)');
}

function updGrenadesMines(dt){
  for(let i=grenades.length-1;i>=0;i--){
    const g=grenades[i];
    g.x+=g.vx*dt;g.y+=g.vy*dt;g.vx*=0.88;g.vy*=0.88;g.timer-=dt;
    if(g.timer<=0||solid(g.x,g.y)){explodeAt(g.x,g.y,80,40);grenades.splice(i,1);}
  }
  for(let i=mines.length-1;i>=0;i--){
    const m=mines[i];
    m.armTimer-=dt;if(m.armTimer>0)continue;
    for(const en of enemies){
      if(en.health<=0)continue;
      if(Math.hypot(en.x-m.x,en.y-m.y)<22){explodeAt(m.x,m.y,70,55);mines.splice(i,1);break;}
    }
  }
  if(localPlayer&&localPlayer.timers){
    if((localPlayer.timers.stim||0)>0)localPlayer.timers.stim-=dt;
    if((localPlayer.timers.xray||0)>0)localPlayer.timers.xray-=dt;
  }
}

function explodeAt(x,y,radius,dmg){
  spawnPart(x,y,'#f80',30);spawnPart(x,y,'#ff4',15);spawnPart(x,y,'#fff',8);
  for(const en of enemies){
    if(en.health<=0)continue;
    const d=Math.hypot(en.x-x,en.y-y);
    if(d<radius){const h=Math.round(dmg*(1-d/radius));en.health-=h;if(en.health<=0){kills++;sessionLoot+=en.reward;addKF(en.type.toUpperCase()+' ELIMINATED');spawnPart(en.x,en.y,en.color,20);}}
  }
  if(localPlayer&&!localPlayer.dead&&Math.hypot(localPlayer.x-x,localPlayer.y-y)<radius*0.5)takeDmg(Math.round(dmg*0.4));
}

function drawGrenadesMines(){
  const t=Date.now()*0.006;
  for(const g of grenades){
    ctx.beginPath();ctx.arc(g.x,g.y,7,0,Math.PI*2);ctx.fillStyle='#f80';ctx.fill();
    ctx.strokeStyle='#ff0';ctx.lineWidth=2;ctx.stroke();
  }
  for(const m of mines){
    const armed=m.armTimer<=0,pulse=armed?(Math.sin(t*5)*0.4+0.6):0.3;
    ctx.beginPath();ctx.arc(m.x,m.y,9,0,Math.PI*2);
    ctx.fillStyle=armed?'rgba(255,80,0,'+pulse.toFixed(2)+')':'rgba(255,200,0,0.3)';ctx.fill();
    ctx.strokeStyle=armed?'#f50':'#ff0';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='7px monospace';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.fillText(armed?'M':'.',m.x,m.y+2);
  }
}

function drawAddonBar(){
  if(!localPlayer)return;
  const ad=localPlayer.addons||{},ti=localPlayer.timers||{};
  const items=[];

  if(ad.grenades>0)items.push('G:'+ad.grenades);

  if(!items.length)return;
  const y0=canvas.height-168,x0=8;
  items.forEach((txt,i)=>{
    const bx=x0+i*52;
    ctx.fillStyle='rgba(0,20,30,0.75)';ctx.fillRect(bx,y0,48,22);
    ctx.strokeStyle='rgba(0,255,231,0.4)';ctx.lineWidth=1;ctx.strokeRect(bx,y0,48,22);
    ctx.font='8px monospace';ctx.fillStyle='#0fe';ctx.textAlign='center';ctx.fillText(txt,bx+24,y0+14);
  });
}

function spawnBullet(x,y,angle,oid,spd,col,dmg,rng){
  bullets.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,ownerId:oid,life:rng,radius:oid.startsWith('e_')?3.5:4,color:col,damage:dmg});

function spawnPart(x,y,col,n=8){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=60+Math.random()*140;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4+Math.random()*0.4,maxLife:0.8,radius:2+Math.random()*3,color:col});}
}
function takeDmg(dmg){
  if(!localPlayer)return;
  let left=dmg;
  if(localPlayer.armor>0){const ab=Math.min(localPlayer.armor,left);localPlayer.armor-=ab;left-=ab;}
  localPlayer.health-=left;
  showHit();spawnPart(localPlayer.x,localPlayer.y,'#f22',6);
}

// ── Joysticks ──────────────────────────────────────
const jL={active:false,sx:0,sy:0,dx:0,dy:0,id:-1};
const jR={active:false,sx:0,sy:0,dx:0,dy:0,id:-1};
const JR=54;
let joyReady=false;

function initJoy(){
  if(joyReady)return;joyReady=true;
  const eL=document.getElementById('joyL'),eR=document.getElementById('joyR');
  const tL=document.getElementById('tL'),tR=document.getElementById('tR');
  const swapEl=document.getElementById('swapBtn');
  const wBarEl=document.getElementById('wBar');

  // Swap button — dedicated touchend, stop propagation so joystick doesn't capture it
  swapEl.addEventListener('touchend',e=>{
    e.preventDefault();e.stopPropagation();
    cycleWep();
  },{passive:false});

  // Joystick touch — only activate if NOT on swap or wBar zone
  document.addEventListener('touchstart',e=>{
    if(gameState!=='playing')return;
    for(const t of e.changedTouches){
      // Skip if target is swapBtn or a wBar child (they handle themselves)
      let el=t.target;
      let isUI=false;
      while(el){if(el===swapEl||el===wBarEl){isUI=true;break;}el=el.parentElement;}
      if(isUI)continue;

      e.preventDefault();
      const rl=eL.getBoundingClientRect(),rr=eR.getBoundingClientRect();
      // Left joystick: left half of screen
      if(t.clientX<window.innerWidth/2&&t.clientY>window.innerHeight*0.4){
        if(!jL.active){jL.active=true;jL.id=t.identifier;jL.sx=rl.left+rl.width/2;jL.sy=rl.top+rl.height/2;tL.style.boxShadow='0 0 16px rgba(0,255,231,0.9)';}
      }
      // Right joystick: right half of screen, not in swap zone
      else if(t.clientX>window.innerWidth/2&&t.clientY>window.innerHeight*0.4){
        const swR=swapEl.getBoundingClientRect();
        const onSwap=t.clientX>=swR.left-10&&t.clientX<=swR.right+10&&t.clientY>=swR.top-10&&t.clientY<=swR.bottom+10;
        if(!onSwap&&!jR.active){jR.active=true;jR.id=t.identifier;jR.sx=rr.left+rr.width/2;jR.sy=rr.top+rr.height/2;tR.style.boxShadow='0 0 16px rgba(0,255,231,0.9)';}
      }
    }
  },{passive:false});

  document.addEventListener('touchmove',e=>{
    if(gameState!=='playing')return;
    e.preventDefault();
    for(const t of e.changedTouches){
      if(jL.active&&t.identifier===jL.id){const dx=t.clientX-jL.sx,dy=t.clientY-jL.sy,d=Math.hypot(dx,dy),cl=Math.min(d,JR),a=Math.atan2(dy,dx);jL.dx=Math.cos(a)*cl/JR;jL.dy=Math.sin(a)*cl/JR;tL.style.transform=`translate(calc(-50% + ${Math.cos(a)*cl}px),calc(-50% + ${Math.sin(a)*cl}px))`;}
      if(jR.active&&t.identifier===jR.id){const dx=t.clientX-jR.sx,dy=t.clientY-jR.sy,d=Math.hypot(dx,dy),cl=Math.min(d,JR),a=Math.atan2(dy,dx);jR.dx=Math.cos(a)*cl/JR;jR.dy=Math.sin(a)*cl/JR;tR.style.transform=`translate(calc(-50% + ${Math.cos(a)*cl}px),calc(-50% + ${Math.sin(a)*cl}px))`;}
    }
  },{passive:false});

  const rst=e=>{for(const t of e.changedTouches){
    if(jL.id===t.identifier){jL.active=false;jL.dx=0;jL.dy=0;jL.id=-1;tL.style.transform='translate(-50%,-50%)';tL.style.boxShadow='';}
    if(jR.id===t.identifier){jR.active=false;jR.dx=0;jR.dy=0;jR.id=-1;tR.style.transform='translate(-50%,-50%)';tR.style.boxShadow='';}
  }};
  document.addEventListener('touchend',rst,{passive:false});
  document.addEventListener('touchcancel',rst,{passive:false});
}

// ── Keyboard ───────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(gameState!=='playing')return;
  if(e.code==='Space'||e.code==='KeyF')doShoot();

  if(e.code==='Digit2')switchTo(1);
  if(e.code==='Digit3')switchTo(2);
});
document.addEventListener('keyup',e=>keys[e.code]=false);
canvas.addEventListener('mousemove',e=>{
  if(!localPlayer)return;
  const r=canvas.getBoundingClientRect();
  localPlayer.aimAngle=Math.atan2(e.clientY-r.top-(localPlayer.y-cam.y),e.clientX-r.left-(localPlayer.x-cam.x));
});
canvas.addEventListener('mousedown',e=>{if(e.button===0&&gameState==='playing')doShoot();});

// ── Game start ─────────────────────────────────────
function startGame(seed){
  hideAllScreens();
  gameState='playing';kills=0;sessionLoot=0;gameTime=ZONE_SECS;shootCD=0;isExtracting=false;extractionProgress=0;
  enemies=[];bullets=[];lootItems=[];particles=[];
  genMap(seed);
  const{sx,sy}=placeSpawnAndExtraction();
  localPlayer=mkLocal(sx,sy);players[myId]=localPlayer;
  spawnEnemies(sx,sy);spawnLoot(sx,sy);spawnAddons(sx,sy);
  resize();
  ['hud','minimap','connSt','joyL','joyR'].forEach(id=>document.getElementById(id).style.display=id==='hud'?'flex':'block');
  document.getElementById('wBar').style.display='flex';
  document.getElementById('swapBtn').style.display='flex';
  initJoy();updHUD();updWBar();updCam();
  gameTimer=setInterval(()=>{gameTime--;updZoneT();if(gameTime<=0)playerDead('ZONE');},1000);
  lastT=performance.now();
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function loop(now){
  const dt=Math.min((now-lastT)/1000,0.05);lastT=now;
  if(gameState==='playing'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

// ── Update ─────────────────────────────────────────
function update(dt){
  if(!localPlayer||localPlayer.dead)return;
  shootCD-=dt*1000;
  let mx=0,my=0;
  if(keys['KeyW']||keys['ArrowUp'])my-=1;if(keys['KeyS']||keys['ArrowDown'])my+=1;
  if(keys['KeyA']||keys['ArrowLeft'])mx-=1;if(keys['KeyD']||keys['ArrowRight'])mx+=1;
  mx+=jL.dx;my+=jL.dy;
  const ml=Math.hypot(mx,my);if(ml>1){mx/=ml;my/=ml;}
  const stimOn=localPlayer.timers&&(localPlayer.timers.stim||0)>0;
  const spd=calcSpeed()*(stimOn?1.5:1)*dt,r=localPlayer.radius;
  const nx=localPlayer.x+mx*spd,ny=localPlayer.y+my*spd;
  if(!solid(nx+r,localPlayer.y)&&!solid(nx-r,localPlayer.y))localPlayer.x=nx;
  if(!solid(localPlayer.x,ny+r)&&!solid(localPlayer.x,ny-r))localPlayer.y=ny;
  if(jR.active&&(Math.abs(jR.dx)>0.1||Math.abs(jR.dy)>0.1)){localPlayer.aimAngle=Math.atan2(jR.dy,jR.dx);doShoot();}
  const w=curWep();
  if(w&&w.reloading&&performance.now()-w.reloadStart>=w.reloadTime*calcRldMult()){
    const need=WDEFS[w.key].ammo-w.ammo,take=Math.min(need,w.reserve);w.ammo+=take;w.reserve-=take;w.reloading=false;updHUD();updWBar();
  }
  updCam();updEnemies(dt);updBullets(dt);updGrenadesMines(dt);
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=0.92;p.vy*=0.92;if(p.life<=0)particles.splice(i,1);}
  for(const l of lootItems)if(!l.collected&&Math.hypot(l.x-localPlayer.x,l.y-localPlayer.y)<30)collectLoot(l);
  const dex=Math.hypot(localPlayer.x-extractionZone.x,localPlayer.y-extractionZone.y);
  if(dex<extractionZone.r){
    if(!isExtracting){isExtracting=true;extractionProgress=0;}
    extractionProgress+=dt*1000;
    const el=document.getElementById('exTimer');el.style.display='block';
    el.innerHTML='>> EXTRACTING <<br>'+Math.ceil((EXTRACTION_MS-extractionProgress)/1000)+'s';
    if(extractionProgress>=EXTRACTION_MS)playerExtracted();
  }else{isExtracting=false;extractionProgress=0;document.getElementById('exTimer').style.display='none';}
  if(Object.keys(dcs).length>0)bcast({type:'state',id:myId,name:myName,x:localPlayer.x,y:localPlayer.y,a:localPlayer.aimAngle,h:localPlayer.health,dead:localPlayer.dead});
  updHUD();
}

function doShoot(){
  if(!localPlayer||localPlayer.dead||gameState!=='playing')return;
  const w=curWep();if(!w||w.reloading)return;
  if(w.ammo<=0){doReload();return;}
  if(shootCD>0)return;
  shootCD=w.fireRate;w.ammo--;
  const dmg=Math.round(w.damage*calcDmgMult());
  const laserOn=localPlayer.addons&&localPlayer.addons.laser;
  for(let i=0;i<w.burst;i++){
    const a=localPlayer.aimAngle+(Math.random()-0.5)*w.spread*(laserOn?0.25:2);
    spawnBullet(localPlayer.x,localPlayer.y,a,myId,w.bulletSpd,w.color,dmg,w.range);
    bcast({type:'shoot',x:localPlayer.x,y:localPlayer.y,a,id:myId,spd:w.bulletSpd,col:w.color,dmg,rng:w.range});
  }
  spawnPart(localPlayer.x+Math.cos(localPlayer.aimAngle)*16,localPlayer.y+Math.sin(localPlayer.aimAngle)*16,'#ffa',3);
  if(w.ammo<=0)doReload();
  updWBar();
}
function doReload(){const w=curWep();if(!w||w.reloading||w.reserve<=0||w.ammo>=WDEFS[w.key].ammo)return;w.reloading=true;w.reloadStart=performance.now();}

function updEnemies(dt){
  const allP=Object.values(players).filter(p=>!p.dead);
  for(const en of enemies){
    if(en.health<=0)continue;
    en.alertCD=Math.max(0,(en.alertCD||0)-dt);
    let near=null,nd=Infinity,vis=false;
    for(const p of allP){const d=Math.hypot(p.x-en.x,p.y-en.y);if(d<nd){nd=d;near=p;vis=(d<=en.sight&&hasLOS(en.x,en.y,p.x,p.y));}}
    if(!near)continue;
    const ang=Math.atan2(near.y-en.y,near.x-en.x);
    if(vis){en.lastKX=near.x;en.lastKY=near.y;en.alertCD=3.5;en.state='chase';}
    else if(en.alertCD>0)en.state='search';
    else en.state='patrol';
    let ma=en.patrolAngle;
    if(en.state==='chase')ma=ang;
    else if(en.state==='search'){ma=Math.atan2(en.lastKY-en.y,en.lastKX-en.x);if(Math.hypot(en.x-en.lastKX,en.y-en.lastKY)<20)en.alertCD=0;}
    else en.patrolAngle+=dt*0.4;
    const nx=en.x+Math.cos(ma)*en.speed*dt,ny=en.y+Math.sin(ma)*en.speed*dt;
    if(!solid(nx,ny)){en.x=nx;en.y=ny;}else en.patrolAngle+=0.4;
    if((isHost||Object.keys(peers).length===0)&&vis&&nd<en.sight*0.92){
      en.lastShot=(en.lastShot||0)+dt*1000;
      if(en.lastShot>en.fr){en.lastShot=0;const sp=en.type==='sniper'?0.02:0.12;
        spawnBullet(en.x,en.y,ang+(Math.random()-0.5)*sp,en.id,en.type==='sniper'?700:en.type==='heavy'?280:380,en.type==='sniper'?'#d4f':en.type==='heavy'?'#f84':'#f40',en.damage,1.6);}
    }
  }
}

function updBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||solid(b.x,b.y)){spawnPart(b.x,b.y,b.color,4);bullets.splice(i,1);continue;}
    if(isCover(b.x,b.y)){spawnPart(b.x,b.y,'#888',3);bullets.splice(i,1);continue;}
    if(b.ownerId===myId){
      let hit=false;
      for(let j=enemies.length-1;j>=0;j--){
        const en=enemies[j];if(en.health<=0)continue;
        if(Math.hypot(b.x-en.x,b.y-en.y)<en.radius+b.radius){
          en.health-=b.damage;spawnPart(en.x,en.y,en.color,8);bullets.splice(i,1);hit=true;
          if(en.health<=0){kills++;sessionLoot+=en.reward;addKF(en.type.toUpperCase()+' DOWN');spawnPart(en.x,en.y,en.color,20);
            lootItems.push({type:'loot',icon:'[L]',value:en.reward,color:'#fd0',label:'+'+en.reward,x:en.x,y:en.y,id:'el_'+en.id,collected:false});
            bcast({type:'enemy_dead',id:en.id});}break;
        }
      }
      if(!hit)Object.values(players).forEach(p=>{if(p.isLocal||p.dead)return;if(Math.hypot(b.x-p.x,b.y-p.y)<p.radius+b.radius)bcast({type:'hit',target:p.id,killer:myId,dmg:b.damage});});
    }
    if(b.ownerId.startsWith('e_')&&localPlayer&&!localPlayer.dead){
      if(Math.hypot(b.x-localPlayer.x,b.y-localPlayer.y)<localPlayer.radius+b.radius){
        takeDmg(b.damage);bullets.splice(i,1);bcast({type:'hit',target:myId,killer:b.ownerId,dmg:b.damage});
        if(localPlayer.health<=0)playerDead('ENEMY');
      }
    }
  }
}

function collectLoot(l){
  l.collected=true;
  if(l.type==='ammo'){const w=curWep();if(w){w.reserve=Math.min(w.reserve+WDEFS[w.key].res,WDEFS[w.key].res*3);showPopup('AMMO +'+WDEFS[w.key].res);}
  }else if(l.type==='health'){localPlayer.health=Math.min(localPlayer.health+l.value,localPlayer.maxHealth);showPopup(l.label);
  }else if(l.type==='weapon'){equipWeapon(l.wkey);
  }else if(l.type==='addon'){applyAddon(l.addonKey);
  }else{sessionLoot+=l.value;showPopup(l.label);}
  spawnPart(l.x,l.y,l.color,12);bcast({type:'loot_taken',lootId:l.id});
  updHUD();updWBar();
}

let popT=null;
function showPopup(t){const el=document.getElementById('lootPop');el.textContent=t;el.style.opacity='1';if(popT)clearTimeout(popT);popT=setTimeout(()=>el.style.opacity='0',1600);}
function showHit(){canvas.style.filter='brightness(2) saturate(0)';setTimeout(()=>canvas.style.filter='',80);}
let kfArr=[];
function addKF(t){const el=document.getElementById('killfeed'),e=document.createElement('div');e.className='kf';e.textContent=t;el.prepend(e);kfArr.push(e);if(kfArr.length>5){kfArr[0].remove();kfArr.shift();}setTimeout(()=>{try{e.remove();}catch(_){}},4000);}

// ── Draw ───────────────────────────────────────────
const TC={0:'#0a1520',1:'#1a2535',2:'#162030',3:'#061520',4:'#0a1f10'};

function draw(){
  resize();ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(-cam.x,-cam.y);
  drawMap();drawEZ();drawLoot();drawEnemies();drawBullets();drawParts();drawPlayers();drawGrenadesMines();
  ctx.restore();drawAddonBar();drawMM();
}
function resize(){const w=window.innerWidth,h=window.innerHeight;if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}}
window.addEventListener('resize',()=>{resize();updCam();});

function drawMap(){
  const sx=Math.max(0,Math.floor(cam.x/TILE)-1),sy=Math.max(0,Math.floor(cam.y/TILE)-1);
  const ex=Math.min(MAP_W,sx+Math.ceil(canvas.width/TILE)+2),ey=Math.min(MAP_H,sy+Math.ceil(canvas.height/TILE)+2);
  for(let ty=sy;ty<ey;ty++)for(let tx=sx;tx<ex;tx++){
    const t=tileMap[ty][tx],px=tx*TILE,py=ty*TILE;
    ctx.fillStyle=TC[t]||TC[0];ctx.fillRect(px,py,TILE,TILE);
    if(t===1){ctx.fillStyle='#233045';ctx.fillRect(px,py,TILE,6);ctx.strokeStyle='rgba(50,80,120,0.35)';ctx.lineWidth=1;ctx.strokeRect(px+.5,py+.5,TILE-1,TILE-1);}
    if(t===2){ctx.fillStyle='#1a3040';ctx.fillRect(px+4,py+4,TILE-8,TILE-8);ctx.strokeStyle='rgba(0,180,200,0.35)';ctx.lineWidth=1;ctx.strokeRect(px+4,py+4,TILE-8,TILE-8);ctx.fillStyle='#2a4560';ctx.fillRect(px+4,py+4,TILE-8,5);}
    if(t===4){const g=ctx.createLinearGradient(px,py,px+TILE,py+TILE);g.addColorStop(0,'rgba(0,80,30,0.5)');g.addColorStop(1,'rgba(0,200,80,0.1)');ctx.fillStyle=g;ctx.fillRect(px,py,TILE,TILE);}
    if(t===0||t===4){ctx.strokeStyle='rgba(0,100,150,0.05)';ctx.lineWidth=0.5;ctx.strokeRect(px,py,TILE,TILE);}
  }
}
function drawEZ(){
  const{x,y,r}=extractionZone,t=Date.now()*0.002;
  for(let i=0;i<3;i++){const ph=(t+i*0.7)%1;ctx.beginPath();ctx.arc(x,y,r*(0.7+ph*0.5),0,Math.PI*2);ctx.strokeStyle=`rgba(0,255,100,${0.45*(1-ph)})`;ctx.lineWidth=2;ctx.stroke();}
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,255,100,0.65)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(0,255,100,0.85)';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('[ EXTRACTION ]',x,y-r-10);
  if(isExtracting&&extractionProgress>0){ctx.beginPath();ctx.arc(x,y,r+8,-Math.PI/2,-Math.PI/2+Math.PI*2*(extractionProgress/EXTRACTION_MS));ctx.strokeStyle='#fd0';ctx.lineWidth=4;ctx.stroke();}
}
function drawLoot(){
  for(const l of lootItems){
    if(l.collected)continue;
    const bob=Math.sin(Date.now()*0.003+l.x)*3;
    const isWep=l.type==='weapon';
    ctx.shadowColor=l.color;ctx.shadowBlur=isWep?16:9;
    ctx.beginPath();ctx.arc(l.x,l.y+bob,isWep?13:9,0,Math.PI*2);ctx.fillStyle=l.color+'33';ctx.fill();
    if(isWep){ctx.beginPath();ctx.arc(l.x,l.y+bob,13,0,Math.PI*2);ctx.strokeStyle=l.color+'88';ctx.lineWidth=2;ctx.stroke();}
    ctx.shadowBlur=0;
    // Use emoji in canvas — fine for game canvas
    ctx.font=(isWep?'15px':'13px')+' serif';ctx.textAlign='center';
    ctx.fillText(isWep?(WEP_EMOJI[l.wkey]||l.icon):l.icon,l.x,l.y+bob+5);
  }
}
function drawEnemies(){
  for(const en of enemies){
    if(en.health<=0)continue;
    const{x,y,radius:r,color,health,maxHealth}=en;
    ctx.beginPath();ctx.ellipse(x,y+r*0.8,r*0.7,r*0.3,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;ctx.stroke();
    if(en.state==='chase'){ctx.beginPath();ctx.arc(x,y,r+5,0,Math.PI*2);ctx.strokeStyle='rgba(255,60,0,0.65)';ctx.lineWidth=1.5;ctx.stroke();}
    else if(en.state==='search'){ctx.beginPath();ctx.arc(x,y,r+5,0,Math.PI*2);ctx.strokeStyle='rgba(255,200,0,0.45)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
    if(en.state!=='patrol'&&localPlayer){const a=Math.atan2(localPlayer.y-y,localPlayer.x-x);ctx.beginPath();ctx.arc(x+Math.cos(a)*r*0.4,y+Math.sin(a)*r*0.4,3,0,Math.PI*2);ctx.fillStyle='#ff0';ctx.fill();}
    if(health<maxHealth){const bw=r*2;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(x-bw/2,y-r-9,bw,4);ctx.fillStyle=health>maxHealth/2?'#0f8':'#f22';ctx.fillRect(x-bw/2,y-r-9,bw*(health/maxHealth),4);}
    ctx.font='7px monospace';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillText(en.type[0].toUpperCase(),x,y+r+9);
  }
}
function drawBullets(){
  for(const b of bullets){
    ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=7;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*0.026,b.y-b.vy*0.026);ctx.strokeStyle=b.color+'66';ctx.lineWidth=2;ctx.stroke();
  }
}
function drawParts(){
  for(const p of particles){const a=p.life/(p.maxLife||0.8);ctx.beginPath();ctx.arc(p.x,p.y,p.radius*a,0,Math.PI*2);ctx.fillStyle=p.color+Math.floor(a*255).toString(16).padStart(2,'0');ctx.fill();}
}
function drawPlayers(){Object.values(players).forEach(p=>drawPlayer(p));}
function drawPlayer(p){
  if(p.dead)return;
  const{x,y,radius:r,color,aimAngle,health,maxHealth,name,isLocal}=p;
  ctx.beginPath();ctx.ellipse(x,y+r*0.8,r*0.7,r*0.3,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
  if(isLocal){ctx.shadowColor=color;ctx.shadowBlur=13;}
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=isLocal?'#0a1520':'#1a0a00';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=isLocal?2.5:2;ctx.stroke();ctx.shadowBlur=0;
  const gl=r+14;ctx.beginPath();ctx.moveTo(x+Math.cos(aimAngle)*r,y+Math.sin(aimAngle)*r);ctx.lineTo(x+Math.cos(aimAngle)*gl,y+Math.sin(aimAngle)*gl);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
  if(isLocal&&curWep()){ctx.font='11px serif';ctx.textAlign='center';ctx.fillText(WEP_EMOJI[curWep().key]||'?',x,y-r-17);}
  ctx.font='9px monospace';ctx.fillStyle=isLocal?'rgba(0,255,231,0.8)':'rgba(255,100,50,0.8)';ctx.fillText(name,x,y-r-5);
  const bw=r*2.5;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(x-bw/2,y-r-3,bw,3);ctx.fillStyle=isLocal?(health>30?'#0f8':'#f22'):'#f64';ctx.fillRect(x-bw/2,y-r-3,bw*(health/maxHealth),3);
  if(isLocal&&p.armor>0&&p.maxArmor>0){ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(x-bw/2,y-r-1,bw,2);ctx.fillStyle='#4af';ctx.fillRect(x-bw/2,y-r-1,bw*(p.armor/p.maxArmor),2);}
  if(isLocal){const w=curWep();if(w&&w.reloading){const pct=Math.min(1,(performance.now()-w.reloadStart)/(w.reloadTime*calcRldMult()));ctx.beginPath();ctx.arc(x,y,r+7,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.strokeStyle='#fd0';ctx.lineWidth=3;ctx.stroke();}}
}
function drawMM(){
  mmCtx.clearRect(0,0,108,108);mmCtx.fillStyle='rgba(0,5,10,0.88)';mmCtx.fillRect(0,0,108,108);
  const sx=108/(MAP_W*TILE),sy=108/(MAP_H*TILE);
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++){const t=tileMap[ty][tx];
    if(t===1){mmCtx.fillStyle='#2a3a50';mmCtx.fillRect(tx*TILE*sx,ty*TILE*sy,TILE*sx+.5,TILE*sy+.5);}
    if(t===4){mmCtx.fillStyle='rgba(0,200,80,0.4)';mmCtx.fillRect(tx*TILE*sx,ty*TILE*sy,TILE*sx+.5,TILE*sy+.5);}
  }
  const xrayOn=localPlayer&&(localPlayer.timers||{}).xray>0;if(hasRadar()||xrayOn)for(const en of enemies){if(en.health<=0)continue;mmCtx.beginPath();mmCtx.arc(en.x*sx,en.y*sy,1.5,0,Math.PI*2);mmCtx.fillStyle=en.state==='chase'?'#f40':'#f22';mmCtx.fill();}
  for(const l of lootItems){if(l.collected)continue;mmCtx.beginPath();mmCtx.arc(l.x*sx,l.y*sy,l.type==='weapon'?2.5:1,0,Math.PI*2);mmCtx.fillStyle=l.type==='weapon'?l.color:'#fd0';mmCtx.fill();}
  Object.values(players).filter(p=>!p.isLocal&&!p.dead).forEach(p=>{mmCtx.beginPath();mmCtx.arc(p.x*sx,p.y*sy,2.5,0,Math.PI*2);mmCtx.fillStyle='#f64';mmCtx.fill();});
  if(localPlayer){mmCtx.beginPath();mmCtx.arc(localPlayer.x*sx,localPlayer.y*sy,3,0,Math.PI*2);mmCtx.fillStyle='#0fe';mmCtx.fill();}
  mmCtx.strokeStyle='rgba(0,255,231,0.2)';mmCtx.lineWidth=0.5;mmCtx.strokeRect(cam.x*sx,cam.y*sy,canvas.width*sx,canvas.height*sy);
}

// ── HUD ────────────────────────────────────────────
function updHUD(){
  if(!localPlayer)return;
  document.getElementById('hpVal').textContent=Math.max(0,Math.floor(localPlayer.health));
  document.getElementById('hFill').style.width=Math.max(0,localPlayer.health/localPlayer.maxHealth*100)+'%';
  document.getElementById('armorFill').style.width=localPlayer.maxArmor>0?Math.max(0,localPlayer.armor/localPlayer.maxArmor*100)+'%':'0%';
  document.getElementById('lootVal').textContent=sessionLoot;
  document.getElementById('killC').textContent=kills;
  const w=curWep();document.getElementById('ammoD').textContent=w?`${w.ammo}/${w.reserve}${w.reloading?' R':''}`:'-';
}
function updZoneT(){const m=Math.floor(gameTime/60).toString().padStart(2,'0'),s=(gameTime%60).toString().padStart(2,'0');document.getElementById('zoneT').textContent=`${m}:${s}`;if(gameTime<=30)document.getElementById('zoneT').style.color='#f22';}
function setConn(c,t){document.getElementById('connDot').className='dot '+c;document.getElementById('connTxt').textContent=t;}

function updMenuStats(){
  const el=document.getElementById('menuStats');if(!el)return;
  el.textContent=`STASH: ${prof.stash}  |  RUNS: ${prof.totalRuns}  |  EXTRACTIONS: ${prof.totalExtractions||0}`;
}

// ── End states ─────────────────────────────────────
function playerDead(killer){
  if(gameState!=='playing')return;
  gameState='dead';if(localPlayer)localPlayer.dead=true;
  clearInterval(gameTimer);gameTimer=null;
  let kept=0;
  if(hasInsurance()){kept=Math.floor(sessionLoot*0.3);prof.stash+=kept;}
  prof.totalRuns++;prof.totalKills+=kills;prof.stashedWeapons=null;prof.stashedWeaponIdx=0;saveProf();
  hideGameHUD();
  document.getElementById('goTitle').textContent='ELIMINATED';
  document.getElementById('goTitle').className='got dead';
  document.getElementById('goStats').textContent=`KILLS: ${kills}  |  LOOT: ${sessionLoot}  |  BY: ${killer}`;
  document.getElementById('goStash').textContent=kept>0?`INSURANCE: +${kept} TO STASH  (STASH: ${prof.stash})`:`STASH: ${prof.stash}`;
  showOnly('goScreen');
}
function playerExtracted(){
  if(gameState!=='playing')return;
  gameState='won';clearInterval(gameTimer);gameTimer=null;
  prof.stash+=sessionLoot;prof.totalRuns++;prof.totalKills+=kills;prof.totalExtractions=(prof.totalExtractions||0)+1;
  // Save carried weapons into stash for next run
  if(localPlayer&&localPlayer.weapons){
    prof.stashedWeapons=localPlayer.weapons.map(w=>({key:w.key,ammo:w.ammo,reserve:w.reserve}));
    prof.stashedWeaponIdx=localPlayer.weaponIdx||0;
  }
  saveProf();
  hideGameHUD();
  const wList=localPlayer?localPlayer.weapons.map(w=>w.name).join(' + '):'';
  document.getElementById('goTitle').textContent='EXTRACTED!';
  document.getElementById('goTitle').className='got win';
  document.getElementById('goStats').textContent='KILLS: '+kills+'  |  LOOT: '+sessionLoot+'  |  TIME: '+(ZONE_SECS-gameTime)+'s';
  document.getElementById('goStash').textContent='+'+sessionLoot+' TO STASH  (TOTAL: '+prof.stash+')  |  GEAR: '+wList;
  showOnly('goScreen');
}
function hideGameHUD(){
  ['hud','minimap','joyL','joyR','connSt','wBar','swapBtn','exTimer'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
}

// ── PWA ────────────────────────────────────────────
function setupPWA(){
  function mkIcon(sz){
    const c=document.createElement('canvas');c.width=c.height=sz;const x=c.getContext('2d');
    x.fillStyle='#040a0f';x.fillRect(0,0,sz,sz);
    x.beginPath();x.arc(sz/2,sz/2,sz*0.44,0,Math.PI*2);x.strokeStyle='#00ffe7';x.lineWidth=sz*0.04;x.stroke();
    x.strokeStyle='#00ffe7';x.lineWidth=sz*0.06;
    x.beginPath();x.moveTo(sz/2,sz*0.25);x.lineTo(sz/2,sz*0.75);x.stroke();
    x.beginPath();x.moveTo(sz*0.25,sz/2);x.lineTo(sz*0.75,sz/2);x.stroke();
    x.fillStyle='#ffd700';[0,1,2,3].forEach(i=>{const a=i*Math.PI/2+Math.PI/4;x.beginPath();x.arc(sz/2+Math.cos(a)*sz*0.32,sz/2+Math.sin(a)*sz*0.32,sz*0.06,0,Math.PI*2);x.fill();});
    x.fillStyle='#00ffe7';x.font=`bold ${sz*0.13}px monospace`;x.textAlign='center';x.textBaseline='middle';x.fillText('EXFIL',sz/2,sz*0.5);
    return c.toDataURL('image/png');
  }
  try{
    const i192=mkIcon(192),i512=mkIcon(512);
    const mf={name:'EXFIL // ZERO',short_name:'EXFIL',start_url:'./',display:'fullscreen',orientation:'landscape',background_color:'#040a0f',theme_color:'#040a0f',
      icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    const bl=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
    const lk=document.createElement('link');lk.rel='manifest';lk.href=URL.createObjectURL(bl);document.head.appendChild(lk);
    const al=document.createElement('link');al.rel='apple-touch-icon';al.href=i192;document.head.appendChild(al);
  }catch(_){}
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSA=window.navigator.standalone===true||window.matchMedia('(display-mode:fullscreen)').matches;
  if(isIOS&&!isSA&&!sessionStorage.getItem('ih')){
    sessionStorage.setItem('ih','1');
    setTimeout(()=>{
      const h=document.createElement('div');
      h.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,20,30,0.96);border:1px solid #0fe;color:#0fe;font-family:monospace;font-size:0.65rem;line-height:1.6;padding:9px 14px;z-index:9999;text-align:center;max-width:260px;';
      h.innerHTML='Safari > Teilen > Zum Home-Bildschirm<br><small style="opacity:0.4">Tippen zum Schliessen</small>';
      h.onclick=()=>h.remove();document.body.appendChild(h);
      setTimeout(()=>{if(h.parentNode)h.remove();},8000);
    },2500);
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    const b=document.createElement('div');
    b.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,20,30,0.96);border:1px solid #fd0;color:#fd0;font-family:monospace;font-size:0.75rem;padding:9px 16px;z-index:9999;cursor:pointer;white-space:nowrap;';
    b.textContent='Installieren';b.onclick=()=>{e.prompt();b.remove();};document.body.appendChild(b);
    setTimeout(()=>{if(b.parentNode)b.remove();},8000);
  });
}

// ── Boot ───────────────────────────────────────────
window.addEventListener('load',async()=>{
  resize();
  await initDB();
  await loadProf();
  setupPWA();
});
document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
